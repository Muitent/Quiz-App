<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="container">
            <div class="screen " id="start-screen">
                <h1> Quiz Time! </h1>
                <p>Test Your Knowledge with these fun question </p>
                <button type="submit">Start Quiz</button>
            </div>
                <div class="screen active" id="quiz-screen">
                    <h3 class="quiz-header">What is your Name ?</h3>
                    <div class="quiz-info">
                        <p>Question <span id="current-question">1</span> of <span id="total-question">5</span></p>
                        <p>Score <span id="question-score">0</span></p>
                        </div>
                        <ul class="question-list" id="question-list">
                            <li>London</li>
                            <li>Berlin</li>
                            <li>Paris</li>
                            <li>Madrid</li>
                        </ul>
                   
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
 </div>


                </div>

                <div class="screen" id="result-screen">
                    <h2>Quiz Result</h2>
                    <div class="result-info">
                       <p> You scored 
                        <span id="total-score" ></span> out of <span id="total-question"></span>
                        </p>
                        <h4>Good effort! Keep learning!</h4>
                        <button class="restart-btn" id="restart-btn"></button>
                    </div>
                </div>


        </div>
</body>
</html>
