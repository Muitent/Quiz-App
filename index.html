<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer type="module"></script>
</head>

<body>
    <div class="container">
        <div class="screen active " id="start-screen">
            <h1> Quiz Time! </h1>
            <p>Test Your Knowledge with these fun question </p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div class="screen " id="quiz-screen">
            <h3 class="quiz-header" id="question-name">What is your Name ?</h3>
            <div class="quiz-info">
                <p>Question <span id="current-question"></span> of <span id="total-question"></span></p>
                <p>Score <span id="question-score">0</span></p>
            </div>
            <ul class="question-list" id="question-list">
               
            </ul>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>


    

    <div class="screen " id="result-screen">
        <h2>Quiz Result</h2>
        <div class="result-info">
            <p> You scored
                <span id="total-score" class="total-score">2</span> out of <span id="total-question" class="total-question">10</span>
            </p>
            <h4>Good effort! Keep learning!</h4>
            <button class="restart-btn" id="restart-btn">Restart</button>
        </div>
    </div>
</div>

    </div>
</body>

</html>
